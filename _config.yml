title: Resume
lang: en-US
description: My resume and others...
remote_theme: pages-themes/hacker@v0.2.0
plugins:
- jekyll-remote-theme

edit: true

copyright:
  revision: true

addons:
  - github
  - gems
  - analytics

addons_commit: true

theme: null

# sort
readme_index:
  with_frontmatter: true

sass:
  style: compressed

exclude:
  - Makefile
  - Gemfile
  - Gemfile.lock
  - ci.sh
  - CODE_OF_CONDUCT.md
  - LICENSE
  - jekyll-rtd-theme.gemspec
